server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Vue Router history mode ────────────────────────────────────────────────
    # All routes that don't match a real file fall back to index.html so the
    # client-side router can handle them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    # Requests to /api/* are forwarded to the Go backend container.
    # The service name "backend" is resolved by Docker Compose's internal DNS.
    # client_max_body_size is raised to match the Go handler's 5 MB upload limit.
    location /api/ {
        proxy_pass             http://backend:8080;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        client_max_body_size   5m;
    }

    # ── Uploaded images proxy ──────────────────────────────────────────────────
    # Uploaded image files are stored and served by the Go backend.
    location /uploads/ {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
